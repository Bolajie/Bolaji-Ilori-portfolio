
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolaji Ilori — No-Code & Automation Engineer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Instrument Sans', 'sans-serif'],
              display: ['Syne', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              brand: {
                orange: '#FF6B2B',
                rose: '#e11d48',
                deep: '#0A0806',
                surface: '#141210',
                amber: '#FFC46B',
                cream: '#EDE8E0',
                muted: '#776960',
              }
            },
            animation: {
              'terminal-blink': 'terminal-blink 1s step-end infinite',
              'reveal': 'reveal 1.0s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'slide-up': 'slide-up 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'float': 'float 6s ease-in-out infinite',
              'marquee': 'marquee 40s linear infinite',
              'breathe': 'breathe 3s ease-in-out infinite',
              'pulse': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'spin': 'spin 1s linear infinite',
              'line-grow': 'line-grow 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'fade-in': 'fade-in 0.6s ease forwards',
            },
            keyframes: {
              'terminal-blink': {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0' },
              },
              reveal: {
                '0%': { transform: 'translateY(28px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              'slide-up': {
                '0%': { transform: 'translateY(110%)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              marquee: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-33.333333%)' },
              },
              breathe: {
                '0%, 100%': { opacity: '0.5' },
                '50%': { opacity: '1' },
              },
              pulse: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0.4' },
              },
              spin: {
                from: { transform: 'rotate(0deg)' },
                to: { transform: 'rotate(360deg)' },
              },
              'line-grow': {
                '0%': { transform: 'scaleX(0)' },
                '100%': { transform: 'scaleX(1)' },
              },
              'fade-in': {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
            }
          }
        }
      }
    </script>
    <style>
        :root {
            --brand-orange: #FF6B2B;
            --brand-rose: #e11d48;
            --brand-amber: #FFC46B;
            --bg-deep: #0A0806;
            --bg-surface: #141210;
            --text-cream: #EDE8E0;
            --text-muted: #776960;
            --border: rgba(255, 240, 228, 0.06);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Instrument Sans', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-cream);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Noise texture */
        .noise-overlay::after {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.03;
            z-index: 9999;
        }

        /* Surface + glass */
        .glass-card {
            background: rgba(20, 18, 10, 0.65);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.035);
        }

        /* Gradients */
        .accent-gradient {
            background: linear-gradient(135deg, var(--brand-orange) 0%, var(--brand-rose) 100%);
        }
        .text-gradient {
            background: linear-gradient(135deg, var(--brand-orange) 10%, var(--brand-rose) 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Background patterns */
        .grid-pattern {
            background-image:
                linear-gradient(rgba(255,107,43,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,107,43,0.04) 1px, transparent 1px);
            background-size: 80px 80px;
        }
        .dot-pattern {
            background-image: radial-gradient(rgba(255,107,43,0.065) 1px, transparent 1px);
            background-size: 44px 44px;
        }
        .radial-glow {
            background: radial-gradient(ellipse 80% 55% at 50% 40%, rgba(255,107,43,0.11) 0%, transparent 65%);
        }

        /* Typography utilities */
        .font-display { font-family: 'Syne', sans-serif; }

        .hero-title {
            font-family: 'Syne', sans-serif;
            letter-spacing: -0.025em;
            line-height: 0.88;
        }

        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: #2A1F17; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--brand-orange); }

        /* Selection */
        ::selection { background: rgba(255,107,43,0.22); color: var(--text-cream); }

        /* Animation helpers */
        .animate-reveal {
            animation: reveal 1.0s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-breathe {
            animation: breathe 3s ease-in-out infinite;
        }
        .line-origin-left { transform-origin: left center; }
    </style>
<script type="importmap">
{
  "imports": {
    "vite": "https://esm.sh/vite@^7.3.1",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "framer-motion": "https://esm.sh/framer-motion@^12.26.2",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.12.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
<body class="noise-overlay">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
