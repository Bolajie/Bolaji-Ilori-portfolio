<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolaji Ilori | Data and Automation Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
              script: ['Dancing Script', 'cursive'],
            },
            colors: {
              brand: {
                orange: '#f97316',
                rose: '#e11d48',
                deep: '#030712',
                surface: '#0a0a0a',
              }
            },
            animation: {
              'blob': 'blob 12s infinite',
              'pulse-slow': 'pulse-slow 4s ease-in-out infinite',
              'data-stream': 'data-stream 25s linear infinite',
              'terminal-blink': 'terminal-blink 1s step-end infinite',
              'ring-rotate': 'ring-rotate 40s linear infinite',
              'reveal': 'reveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'float': 'float 6s ease-in-out infinite',
              'marquee': 'marquee 40s linear infinite',
            },
            keyframes: {
              blob: {
                '0%, 100%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(50px, -70px) scale(1.1)' },
                '66%': { transform: 'translate(-40px, 40px) scale(0.9)' },
              },
              'pulse-slow': {
                '0%, 100%': { opacity: 0.3 },
                '50%': { opacity: 0.6 },
              },
              'data-stream': {
                '0%': { transform: 'translateY(120%)', opacity: 0 },
                '15%, 85%': { opacity: 0.2 },
                '100%': { transform: 'translateY(-120%)', opacity: 0 },
              },
              'ring-rotate': {
                'from': { transform: 'rotate(0deg)' },
                'to': { transform: 'rotate(360deg)' }
              },
              reveal: {
                '0%': { transform: 'translateY(40px)', opacity: '0', filter: 'blur(8px)' },
                '100%': { transform: 'translateY(0)', opacity: '1', filter: 'blur(0px)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              marquee: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-33.333333%)' },
              }
            }
          }
        }
      }
    </script>
    <style>
        :root {
            --brand-orange: #f97316;
            --brand-rose: #e11d48;
            --bg-deep: #030712;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: #f8fafc;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        .noise-overlay::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            z-index: 9999;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }
        
        .accent-gradient {
            background: linear-gradient(135deg, var(--brand-orange) 0%, var(--brand-rose) 100%);
        }
        
        .text-gradient {
            background: linear-gradient(135deg, var(--brand-orange) 10%, var(--brand-rose) 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .grid-pattern {
            background-image: radial-gradient(rgba(249, 115, 22, 0.08) 1.5px, transparent 1.5px);
            background-size: 60px 60px;
        }

        .hero-title {
            letter-spacing: -0.05em;
            line-height: 1.1;
        }

        .btn-shadow:hover {
            box-shadow: 0 0 30px rgba(249, 115, 22, 0.4);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--brand-orange); }

        .radial-glow {
            background: radial-gradient(circle at center, rgba(249, 115, 22, 0.15) 0%, transparent 70%);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/": "https://esm.sh/react@18.2.0/",
    "react-dom": "https://esm.sh/react-dom@18.2.0?deps=react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?deps=react@18.2.0",
    "react-router-dom": "https://esm.sh/react-router-dom@6.22.3?deps=react@18.2.0,react-dom@18.2.0",
    "framer-motion": "https://esm.sh/framer-motion@11.0.3?deps=react@18.2.0,react-dom@18.2.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
<body class="noise-overlay">
    <div id="root"></div>
</body>
</html>
